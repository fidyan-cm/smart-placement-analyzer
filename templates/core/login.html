<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login — Smart Placement Analyzer</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-5" style="max-width: 420px;">
  <div class="text-center mb-4">
    <h4 class="fw-bold">Smart Placement Analyzer</h4>
    <p class="text-muted small">Sign in to your account</p>
  </div>

  {% if messages %}
    {% for message in messages %}
    <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
      {{ message }}
      <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    {% endfor %}
  {% endif %}

  <div class="card shadow-sm p-4">
    <form method="POST">
      {% csrf_token %}
      {% for field in form %}
      <div class="mb-3">
        <label class="form-label fw-medium small">{{ field.label }}</label>
        <input type="{{ field.field.widget.input_type }}"
               name="{{ field.html_name }}"
               class="form-control"
               placeholder="{{ field.label }}"
               {% if field.value %}value="{{ field.value }}"{% endif %}>
        {% if field.errors %}
          <div class="text-danger small mt-1">{{ field.errors.0 }}</div>
        {% endif %}
      </div>
      {% endfor %}
      <button type="submit" class="btn btn-primary w-100 py-2 mt-2">Sign In</button>
    </form>
    <hr>
    <p class="text-center small mb-0">
      Don't have an account? <a href="{% url 'register' %}">Register here</a>
    </p>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
